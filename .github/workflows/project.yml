name: iOS Build

on:
  push:
    branches: [main]
    paths:
      - "AuroraStreamiOS/**"
      - ".github/workflows/ios-build.yml"
  pull_request:
    branches: [main]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: macos-14
    defaults:
      run:
        working-directory: AuroraStreamiOS

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # تحديد وتفعيل إصدار Xcode 16 تلقائياً
      - name: Setup Xcode version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16'

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      # أضفنا سطر SYMROOT=./build لتجميع التطبيق في مجلد واضح داخل المشروع
      - name: Build (Simulator, no code signing for iOS 17)
        run: |
          xcodebuild \
            -project AuroraStream.xcodeproj \
            -scheme AuroraStream \
            -destination "generic/platform=iOS Simulator" \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            IPHONEOS_DEPLOYMENT_TARGET=17.0 \
            SYMROOT=./build \
            build

      # خطوة جديدة لرفع التطبيق المستخرج لتتمكن من تحميله
      - name: Upload Built App
        uses: actions/upload-artifact@v4
        with:
          name: AuroraStream-Simulator-App
          path: AuroraStreamiOS/build/Debug-iphonesimulator/AuroraStream.app

      - name: Run unit tests (if any for iOS 17)
        run: |
          xcodebuild \
            -project AuroraStream.xcodeproj \
            -scheme AuroraStream \
            -destination "platform=iOS Simulator,name=iPhone 15" \
            CODE_SIGNING_ALLOWED=NO \
            IPHONEOS_DEPLOYMENT_TARGET=17.0 \
            SYMROOT=./build \
            test || echo "No tests configured yet — skipping."
