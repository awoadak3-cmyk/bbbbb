name: AuroraStream
options:
  bundleIdPrefix: com.aurorastream
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true

targets:
  AuroraStream:
    type: application
    platform: iOS
    sources:
      - path: Sources
    info:
      path: Sources/Info.plist
      properties:
        UILaunchScreen: {}
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.aurorastream.app
        PRODUCT_NAME: AuroraStream
        SWIFT_VERSION: 5.0
        TARGETED_DEVICE_FAMILY: "1,2"
        GENERATE_INFOPLIST_FILE: NO
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        ENABLE_PREVIEWS: YES
