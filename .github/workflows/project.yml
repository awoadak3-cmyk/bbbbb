name: iOS Build

on:
  push:
    branches: [main]
    paths:
      - "AuroraStreamiOS/**"
      - ".github/workflows/ios-build.yml"
  pull_request:
    branches: [main]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: macos-14
    defaults:
      run:
        working-directory: AuroraStreamiOS

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # استبدال التحديد اليدوي بأداة تقوم بإيجاد وتفعيل Xcode 16 تلقائياً
      - name: Setup Xcode version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16'

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build (Simulator, no code signing)
        run: |
          xcodebuild \
            -project AuroraStream.xcodeproj \
            -scheme AuroraStream \
            -destination "generic/platform=iOS Simulator" \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Run unit tests (if any)
        run: |
          xcodebuild \
            -project AuroraStream.xcodeproj \
            -scheme AuroraStream \
            -destination "platform=iOS Simulator,name=iPhone 15" \
            CODE_SIGNING_ALLOWED=NO \
            test || echo "No tests configured yet — skipping."
